# SSL Automation - Security Policy Configuration
# Define acceptable TLS versions, cipher suites, and validation rules

tls:
  allowed_versions:
    - "TLSv1.2"
    - "TLSv1.3"
  forbidden_versions:
    - "SSLv2"
    - "SSLv3"
    - "TLSv1.0"
    - "TLSv1.1"
  preferred_version: "TLSv1.3"

ciphers:
  allowed:
    # TLS 1.3 ciphers (always secure)
    - "TLS_AES_256_GCM_SHA384"
    - "TLS_AES_128_GCM_SHA256"
    - "TLS_CHACHA20_POLY1305_SHA256"
    # TLS 1.2 strong ciphers
    - "ECDHE-RSA-AES256-GCM-SHA384"
    - "ECDHE-ECDSA-AES256-GCM-SHA384"
    - "ECDHE-RSA-AES128-GCM-SHA256"
    - "ECDHE-ECDSA-AES128-GCM-SHA256"
    - "ECDHE-RSA-CHACHA20-POLY1305"
    - "ECDHE-ECDSA-CHACHA20-POLY1305"
    - "DHE-RSA-AES256-GCM-SHA384"
    - "DHE-RSA-AES128-GCM-SHA256"

  forbidden:
    # NULL encryption
    - "NULL"
    - "eNULL"
    - "aNULL"
    # Export-grade (weak)
    - "EXPORT"
    - "EXP"
    # RC4 (broken)
    - "RC4"
    # DES / 3DES (weak)
    - "DES"
    - "3DES"
    # MD5 MAC (weak)
    - "MD5"
    # Anonymous DH (no authentication)
    - "ADH"
    - "AECDH"

certificate:
  min_key_size_rsa: 2048
  min_key_size_ecdsa: 256
  allowed_signature_algorithms:
    - "sha256WithRSAEncryption"
    - "sha384WithRSAEncryption"
    - "sha512WithRSAEncryption"
    - "ecdsa-with-SHA256"
    - "ecdsa-with-SHA384"
    - "ecdsa-with-SHA512"
  forbidden_signature_algorithms:
    - "md5WithRSAEncryption"
    - "sha1WithRSAEncryption"
  expiry_warning_days: 30
  expiry_critical_days: 14
  require_san: true                  # Subject Alternative Names required
  require_ocsp_stapling: false       # OCSP stapling (optional)

hsts:
  required: true
  min_max_age: 15768000              # 6 months in seconds
  include_subdomains: true
  preload: false

other_headers:
  check_x_frame_options: true
  check_x_content_type: true

reporting:
  fail_on_forbidden_cipher: true
  fail_on_forbidden_tls_version: true
  fail_on_expired_cert: true
  fail_on_expiry_critical: true
  warn_on_expiry_warning: true
  fail_on_self_signed: true
  fail_on_weak_key: true
